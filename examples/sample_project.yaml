      gate: GA-评审
      decision_owner: CTO
    - name: 商户台
      methodology: agile
      gate: Sprint 评审
      decision_owner: 产品VP
    - name: 数据平台
      methodology: hybrid
      gate: 阶段门
      decision_owner: 数据负责人
  principles:
    - 关口未过不得进入下一阶段
    - 混合部分按各自方法论度量，统一健康度上报
